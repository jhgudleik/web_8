<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список дел</title>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Список дел</h1>

    <div>
        <input type="text" id="taskInput" placeholder="Введите текст задачи">
        <button id="addButton">Добавить</button>
    </div>

    <div class="filters">
        <button class="filter-btn" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="completed">Выполненные</button>
        <button class="filter-btn" data-filter="active">Невыполненные</button>
    </div>

    <div id="taskList"></div>

    <div class="stats">
        Всего задач: <span id="totalCount">0</span> |
        Выполнено: <span id="completedCount">0</span> |
        Осталось: <span id="activeCount">0</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
